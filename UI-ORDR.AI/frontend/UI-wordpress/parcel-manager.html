<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parcel Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .parcel-manager-ui {
      --pm-primary: #ff3c08;
      --pm-primary-quiet: rgba(255, 60, 8, .1);
      --pm-primary-container: #ffe1d8;
      --pm-secondary: #008542;
      --pm-error: #b42318;
      --pm-surface: #fdf6f2;
      --pm-surface-soft: #f9f1ee;
      --pm-surface-variant: #f4e8e2;
      --pm-surface-container: #f7ede8;
      --pm-surface-container-high: #eadbd4;
      --pm-surface-container-highest: #dfccc3;
      --pm-on-surface: #2c2624;
      --pm-on-surface-variant: #73635d;
      --pm-on-primary: #fff8f5;
      --pm-font-body: "Roboto", sans-serif;
      --pm-font-headline: "Fredoka", sans-serif;
      position: relative;
      min-width: 320px;
      height: 100vh;
      min-height: 720px;
      overflow: hidden;
      background: var(--pm-surface);
      color: var(--pm-on-surface);
      font-family: var(--pm-font-body);
      line-height: 1.4;
      isolation: isolate;
      box-sizing: border-box;
    }

    .parcel-manager-ui,
    .parcel-manager-ui * ,
    .parcel-manager-ui *::before,
    .parcel-manager-ui *::after { box-sizing: border-box; }

    .parcel-manager-ui button,
    .parcel-manager-ui input,
    .parcel-manager-ui a { font: inherit; }

    .parcel-manager-ui button {
      border: 0;
      cursor: pointer;
    }

    .parcel-manager-ui button:disabled {
      cursor: not-allowed;
      opacity: .62;
    }

    .parcel-manager-ui a { color: inherit; text-decoration: none; }

    .parcel-manager-ui svg {
      width: 1.25rem;
      height: 1.25rem;
      display: inline-block;
      flex: 0 0 auto;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .parcel-manager-ui .pm-shell {
      display: grid;
      grid-template-columns: 16rem minmax(0, 1fr);
      height: 100%;
      min-height: inherit;
      overflow: hidden;
    }

    .parcel-manager-ui .pm-sidebar {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border-right: 1px solid #f4ded9;
      background: #f5ded8;
      scrollbar-width: none;
    }

    .parcel-manager-ui .pm-sidebar::-webkit-scrollbar,
    .parcel-manager-ui .pm-scroll-none::-webkit-scrollbar { display: none; }

    .parcel-manager-ui .pm-sidebar-inner {
      padding: 1rem 1.5rem 2rem;
    }

    .parcel-manager-ui .pm-sidebar-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 3rem;
      margin-bottom: 1.5rem;
    }

    .parcel-manager-ui .pm-brand {
      display: flex;
      align-items: center;
      gap: .9rem;
      margin-bottom: 1.25rem;
    }

    .parcel-manager-ui .pm-sidebar-logo {
      display: block;
      width: min(7.5rem, 100%);
      height: auto;
      object-fit: contain;
    }

    .parcel-manager-ui .pm-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.875rem;
      height: 2.875rem;
      border-radius: 999px;
      background: #fe3c06;
      color: #fff;
      font-weight: 800;
      font-family: var(--pm-font-headline);
    }

    .parcel-manager-ui .pm-topbar-start {
      display: none;
      align-items: center;
      gap: .65rem;
      min-width: 0;
    }

    .parcel-manager-ui .pm-brand-name,
    .parcel-manager-ui .pm-heading,
    .parcel-manager-ui .pm-column-title,
    .parcel-manager-ui .pm-side-title,
    .parcel-manager-ui .pm-inventory-header h1,
    .parcel-manager-ui .pm-inventory-card h4,
    .parcel-manager-ui .pm-dialog h3 {
      font-family: var(--pm-font-headline);
      font-weight: 600;
      letter-spacing: 0;
    }

    .parcel-manager-ui .pm-nav {
      display: flex;
      flex-direction: column;
      gap: .25rem;
      padding: .5rem 0 1rem;
    }

    .parcel-manager-ui .pm-brand-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
    }

    .parcel-manager-ui .pm-nav-button {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 1rem;
      border-radius: 999px;
      padding: .75rem 1.5rem;
      background: transparent;
      color: #53433f;
      text-align: left;
      transition: background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .parcel-manager-ui .pm-nav-button:hover {
      background: #f4ded9;
    }

    .parcel-manager-ui .pm-nav-button.is-active {
      background: #fe3c06;
      color: #fff;
      box-shadow: 0 14px 28px rgba(254, 60, 6, .2);
    }

    .parcel-manager-ui .pm-nav-button svg {
      width: 1.55rem;
      height: 1.55rem;
    }

    .parcel-manager-ui .pm-nav-label {
      font-size: .875rem;
      font-weight: 700;
    }

    .parcel-manager-ui .pm-prep {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
    }

    .parcel-manager-ui .pm-prep-card,
    .parcel-manager-ui .pm-card,
    .parcel-manager-ui .pm-empty,
    .parcel-manager-ui .pm-stat-card,
    .parcel-manager-ui .pm-popover,
    .parcel-manager-ui .pm-dialog {
      border: 1px solid var(--pm-surface-container-highest);
      background: #fff;
      box-shadow: 0 2px 8px rgba(44, 38, 36, .04);
    }

    .parcel-manager-ui .pm-prep-card {
      border-radius: 1rem;
      padding: 1rem;
    }

    .parcel-manager-ui .pm-eyebrow {
      margin: 0 0 .75rem;
      color: rgba(115, 99, 93, .58);
      font-size: .625rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .parcel-manager-ui .pm-prep-table {
      width: 100% !important;
      max-width: 100% !important;
      table-layout: fixed !important;
      border-collapse: collapse !important;
      border-spacing: 0 !important;
      border: 0 !important;
      background: transparent !important;
      font-size: .75rem;
    }

    .parcel-manager-ui .pm-prep-name-col { width: auto !important; }
    .parcel-manager-ui .pm-prep-count-col { width: 2.25rem !important; }

    .parcel-manager-ui .pm-prep-table tbody,
    .parcel-manager-ui .pm-prep-table tr {
      width: 100% !important;
      border: 0 !important;
      background: transparent !important;
    }

    .parcel-manager-ui .pm-prep-table td {
      box-sizing: border-box !important;
      padding: .5rem 0 !important;
      border: 0 !important;
      border-top: 1px solid rgba(223, 204, 195, .35) !important;
      background: transparent !important;
      color: var(--pm-on-surface-variant) !important;
      font-weight: 600;
      line-height: 1.25 !important;
      vertical-align: middle !important;
    }

    .parcel-manager-ui .pm-prep-table tr:first-child td { border-top: 0 !important; }
    .parcel-manager-ui .pm-prep-table td:first-child {
      overflow-wrap: anywhere !important;
      padding-right: .75rem !important;
    }
    .parcel-manager-ui .pm-prep-table td:last-child {
      width: 2.25rem !important;
      min-width: 2.25rem !important;
      max-width: 2.25rem !important;
      border-left: 0 !important;
      color: var(--pm-primary) !important;
      text-align: right !important;
      font-weight: 900;
      white-space: nowrap !important;
    }

    .parcel-manager-ui .pm-logout-wrap {
      margin-top: auto;
      padding: 1.5rem;
    }

    .parcel-manager-ui .pm-logout {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      border-radius: 999px;
      padding: .75rem 1rem;
      background: transparent;
      color: #53433f;
      font-family: var(--pm-font-body);
      font-size: .875rem;
      font-weight: 600;
      line-height: 1.25rem;
    }

    .parcel-manager-ui .pm-logout:hover {
      background: #f4ded9;
    }

    .parcel-manager-ui .pm-main {
      display: flex;
      min-width: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .parcel-manager-ui .pm-topbar {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      height: 4rem;
      margin-top: .5rem;
      padding: .75rem 1.5rem;
      background: rgba(253, 246, 242, .88);
      backdrop-filter: blur(18px);
    }

    .parcel-manager-ui .pm-search {
      display: flex;
      align-items: center;
      width: min(100%, 42rem);
      max-width: 42rem;
      height: 2.625rem;
      border: 1px solid var(--pm-surface-container-highest);
      border-radius: 999px;
      background: #fff;
      padding: .5rem 1.25rem;
      box-shadow: 0 2px 8px rgba(44, 38, 36, .04);
    }

    .parcel-manager-ui .pm-search svg {
      width: 1.5rem;
      height: 1.5rem;
      margin-right: .75rem;
      color: #8f817c;
      opacity: 1;
      stroke-width: 2.1;
    }

    .parcel-manager-ui .pm-search input,
    .parcel-manager-ui .pm-inventory-search input,
    .parcel-manager-ui .pm-control-search input,
    .parcel-manager-ui .pm-signup-field {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--pm-on-surface);
    }

    .parcel-manager-ui .pm-search input {
      font-family: var(--pm-font-body);
      font-size: .875rem;
      line-height: 1.25rem;
    }

    .parcel-manager-ui .pm-search input::placeholder,
    .parcel-manager-ui .pm-inventory-search input::placeholder,
    .parcel-manager-ui .pm-control-search input::placeholder,
    .parcel-manager-ui .pm-signup-field::placeholder { color: rgba(115, 99, 93, .45); }

    .parcel-manager-ui .pm-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1.25rem;
      min-width: max-content;
    }

    .parcel-manager-ui .pm-order-status {
      display: flex;
      align-items: center;
      gap: .75rem;
      border: 1px solid var(--pm-surface-container-highest);
      border-radius: 999px;
      background: #fffaf7;
      padding: .5rem 1rem;
    }

    .parcel-manager-ui .pm-status-dot {
      width: .625rem;
      height: .625rem;
      border-radius: 999px;
      background: var(--pm-error);
    }

    .parcel-manager-ui .pm-status-dot.is-live {
      background: #10b981;
      animation: pm-pulse 1.7s infinite;
    }

    .parcel-manager-ui .pm-status-label {
      font-family: var(--pm-font-body);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .parcel-manager-ui .pm-switch {
      position: relative;
      width: 2.5rem;
      height: 1.25rem;
      border-radius: 999px;
      background: var(--pm-surface-container-highest);
      padding: .125rem;
      transition: background .18s ease;
    }

    .parcel-manager-ui .pm-switch.is-on { background: #064e3b; }

    .parcel-manager-ui .pm-switch::after {
      content: "";
      display: block;
      width: 1rem;
      height: 1rem;
      border-radius: 999px;
      background: #fff;
      transition: transform .18s ease;
    }

    .parcel-manager-ui .pm-switch.is-on::after { transform: translateX(1.25rem); }

    .parcel-manager-ui .pm-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 999px;
      background: transparent;
      color: var(--pm-on-surface-variant);
      transition: background .18s ease, color .18s ease;
    }

    .parcel-manager-ui .pm-icon-button:hover {
      background: var(--pm-surface-container);
      color: var(--pm-primary);
    }

    .parcel-manager-ui .pm-actions .pm-icon-button svg {
      width: 1.5rem;
      height: 1.5rem;
    }

    .parcel-manager-ui .pm-actions .pm-profile-button svg {
      width: 1.25rem;
      height: 1.25rem;
    }

    .parcel-manager-ui .pm-refresh {
      width: 2.5rem;
      border: 1px solid var(--pm-surface-container-highest);
      background: var(--pm-surface-container-highest);
    }

    .parcel-manager-ui .pm-notification-wrap,
    .parcel-manager-ui .pm-profile-wrap { position: relative; }

    .parcel-manager-ui .pm-badge-dot {
      position: absolute;
      right: .45rem;
      top: .45rem;
      width: .5rem;
      height: .5rem;
      border-radius: 999px;
      background: var(--pm-primary);
    }

    .parcel-manager-ui .pm-profile-button {
      border: 2px solid #fff;
      background: var(--pm-surface-container-highest);
      box-shadow: 0 2px 6px rgba(44, 38, 36, .08);
    }

    .parcel-manager-ui .pm-popover {
      position: absolute;
      top: calc(100% + .65rem);
      right: 0;
      z-index: 10;
      width: 20rem;
      border-radius: 1.5rem;
      padding: 1rem;
      color: var(--pm-on-surface);
    }

    .parcel-manager-ui .pm-popover.is-notifications { right: -2.75rem; width: 18rem; }
    .parcel-manager-ui .pm-popover.is-help {
      width: 18.5rem;
      padding: .5rem 0;
      border-radius: 1.25rem;
    }

    .parcel-manager-ui .pm-popover-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: .75rem;
    }

    .parcel-manager-ui .pm-popover-title {
      margin: 0;
      font-size: .875rem;
      font-weight: 700;
    }

    .parcel-manager-ui .pm-new-pill {
      border-radius: 999px;
      background: var(--pm-primary-container);
      color: var(--pm-primary);
      padding: .125rem .5rem;
      font-size: .625rem;
      font-weight: 900;
    }

    .parcel-manager-ui .pm-note {
      border-radius: 1rem;
      background: var(--pm-surface-container);
      padding: .75rem;
      font-size: .75rem;
    }

    .parcel-manager-ui .pm-note + .pm-note { margin-top: .5rem; }
    .parcel-manager-ui .pm-note strong { display: block; margin-bottom: .2rem; }
    .parcel-manager-ui .pm-note span { color: var(--pm-on-surface-variant); }

    .parcel-manager-ui .pm-help-menu {
      display: grid;
    }

    .parcel-manager-ui .pm-help-option {
      display: flex;
      width: 100%;
      min-height: 2.75rem;
      align-items: center;
      border: 0;
      background: transparent;
      padding: .7rem 1rem;
      color: var(--pm-on-surface);
      font-family: var(--pm-font-body);
      font-size: .95rem;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .parcel-manager-ui .pm-help-option:hover {
      background: var(--pm-surface-container);
    }

    .parcel-manager-ui .pm-signup-copy {
      margin: .25rem 0 0;
      color: var(--pm-on-surface-variant);
      font-size: .75rem;
    }

    .parcel-manager-ui .pm-signup-form {
      display: grid;
      gap: .75rem;
      margin-top: 1rem;
    }

    .parcel-manager-ui .pm-signup-field {
      border: 1px solid var(--pm-surface-container-highest);
      border-radius: 1rem;
      background: var(--pm-surface-container);
      padding: .65rem 1rem;
      font-size: .875rem;
    }

    .parcel-manager-ui .pm-signup-field.has-error { border-color: var(--pm-error); }

    .parcel-manager-ui .pm-field-error {
      margin: .28rem 0 0;
      color: var(--pm-error);
      font-size: .75rem;
      font-weight: 700;
    }

    .parcel-manager-ui .pm-success {
      margin: 0;
      color: var(--pm-secondary);
      font-size: .75rem;
      font-weight: 900;
    }

    .parcel-manager-ui .pm-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--pm-primary);
      color: var(--pm-on-primary);
      padding: .72rem 1.25rem;
      font-size: .875rem;
      font-weight: 900;
      transition: filter .18s ease, transform .18s ease;
    }

    .parcel-manager-ui .pm-button:hover { filter: brightness(1.07); }
    .parcel-manager-ui .pm-button:active { transform: translateY(1px); }

    .parcel-manager-ui .pm-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .parcel-manager-ui .pm-page {
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 1.5rem;
      background: var(--pm-surface);
      scrollbar-width: none;
    }

    .parcel-manager-ui .pm-page::-webkit-scrollbar { display: none; }

    .parcel-manager-ui .pm-board-page {
      display: flex;
      padding: 0;
      overflow: hidden;
    }

    .parcel-manager-ui .pm-board-area {
      position: relative;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      padding: 1.5rem;
      scrollbar-width: none;
    }

    .parcel-manager-ui .pm-board-top {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
      padding-inline: .5rem;
    }

    .parcel-manager-ui .pm-board-page .pm-board-top {
      position: absolute;
      right: 1.5rem;
      bottom: 1.5rem;
      z-index: 3;
      margin: 0;
      padding: 0;
    }

    .parcel-manager-ui .pm-columns {
      display: grid;
      grid-template-columns: repeat(3, minmax(20rem, 1fr));
      gap: 1.5rem;
      min-width: 62.5rem;
      height: 100%;
    }

    .parcel-manager-ui .pm-column {
      display: flex;
      min-width: 0;
      flex-direction: column;
    }

    .parcel-manager-ui .pm-column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: 1rem;
      padding: 0 .5rem;
    }

    .parcel-manager-ui .pm-column-title {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin: 0;
      font-size: 1.125rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .parcel-manager-ui .pm-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      border-radius: 999px;
      background: var(--pm-surface-container-highest);
      color: #231a17;
      padding: .2rem .65rem;
      font-size: .8125rem;
      font-weight: 900;
      line-height: 1;
    }

    .parcel-manager-ui .pm-card-list {
      display: grid;
      gap: 1rem;
      align-content: start;
      overflow-y: auto;
      padding-bottom: 1.5rem;
      scrollbar-width: none;
    }

    .parcel-manager-ui .pm-card-list::-webkit-scrollbar { display: none; }

    .parcel-manager-ui .pm-card {
      border-radius: 1.5rem;
      padding: 1.25rem;
      transition: box-shadow .18s ease, transform .18s ease;
    }

    .parcel-manager-ui .pm-card:hover {
      box-shadow: 0 12px 22px rgba(44, 38, 36, .08);
      transform: translateY(-1px);
    }

    .parcel-manager-ui .pm-card-top,
    .parcel-manager-ui .pm-card-foot,
    .parcel-manager-ui .pm-delivered-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .parcel-manager-ui .pm-card-top { margin-bottom: .75rem; }

    .parcel-manager-ui .pm-card-id {
      font-size: .875rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .parcel-manager-ui .pm-pill {
      border-radius: 999px;
      padding: .25rem .55rem;
      font-size: .625rem;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .parcel-manager-ui .pm-pill-delayed {
      background: var(--pm-primary-quiet);
      color: var(--pm-primary);
    }

    .parcel-manager-ui .pm-pill-muted {
      color: rgba(115, 99, 93, .58);
    }

    .parcel-manager-ui .pm-items {
      display: grid;
      gap: .25rem;
      margin-bottom: 1rem;
    }

    .parcel-manager-ui .pm-items p {
      margin: 0;
      color: var(--pm-on-surface);
      font-size: .875rem;
      font-weight: 700;
    }

    .parcel-manager-ui .pm-addon {
      color: var(--pm-on-surface-variant) !important;
      font-size: .6875rem !important;
      font-weight: 500 !important;
    }

    .parcel-manager-ui .pm-progress {
      height: .375rem;
      overflow: hidden;
      border-radius: 999px;
      background: var(--pm-surface-container-highest);
      margin-bottom: 1rem;
    }

    .parcel-manager-ui .pm-progress span {
      display: block;
      height: 100%;
      background: var(--pm-primary);
    }

    .parcel-manager-ui .pm-time,
    .parcel-manager-ui .pm-packby {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: .35rem;
      color: var(--pm-on-surface-variant);
      font-family: var(--pm-font-headline);
      font-size: .75rem;
      font-weight: 900;
    }

    .parcel-manager-ui .pm-time.is-delayed { color: var(--pm-primary); }

    .parcel-manager-ui .pm-time svg,
    .parcel-manager-ui .pm-packby svg {
      width: .95rem;
      height: .95rem;
    }

    .parcel-manager-ui .pm-ship-button,
    .parcel-manager-ui .pm-deliver-button {
      border-radius: 999px;
      padding: .55rem 1.25rem;
      color: #fff;
      font-size: .75rem;
      font-weight: 900;
      white-space: nowrap;
      transition: filter .18s ease;
    }

      function escapeHtml(value) {
        return String(value == null ? "" : value)

          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function timeNow() {

      function getPrepTally() {
        var tally = {};
        state.packingOrders.forEach(function (order) {
          order.items.forEach(function (lineItem) {
            var match = lineItem.match(/^(\d+)x\s+(.+)$/i);
            var count = match ? Number(match[1]) : 1;
            var name = match ? match[2] : lineItem;
            tally[name] = (tally[name] || 0) + count;
          });
        });
        return Object.keys(tally).map(function (item) {
          return { item: item, count: tally[item] };
        }).slice(0, 6);
      }

            showPrep ? '<div class="pm-prep"><div class="pm-prep-card"><p class="pm-eyebrow">Live Prep Tally</p><table class="pm-prep-table"><colgroup><col class="pm-prep-name-col"><col class="pm-prep-count-col"></colgroup><tbody>' +
              (prep.length ? prep.map(function (row) {
                return '<tr><td>' + escapeHtml(row.item) + '</td><td>' + row.count + '</td></tr>';
              }).join("") : '<tr><td colspan="2">No active prep</td></tr>') +
              '</tbody></table></div></div>' : "",
          '</div>',
          '<div class="pm-logout-wrap"><button class="pm-logout" type="button">' + icon("logout") + '<span>Logout</span></button></div>'
        ].join("");
      }

      function renderTopbar() {
        var topbar = root.querySelector('[data-region="topbar"]');
        var statusLabel = state.acceptingOrders ? "Accepting Orders" : "Paused Orders";
        var restaurantError = state.signupSubmitted && state.signup.restaurant.trim().length < 2;
        var emailError = state.signupSubmitted && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.signup.email);

        topbar.innerHTML = [
          '<div class="pm-topbar-start">',
            '<button class="pm-icon-button pm-mobile-menu" type="button" data-action="open-sidebar" aria-label="Open navigation">' + icon("menu") + '</button>',
          '</div>',
          '<label class="pm-search"><span data-icon="search"></span><input type="search" data-action="global-search" placeholder="Search orders, or menu items..." value="' + escapeHtml(state.searchQuery) + '" aria-label="Search orders or menu items"></label>',
          '<div class="pm-actions">',
            '<div class="pm-order-status"><span class="pm-status-dot ' + (state.acceptingOrders ? "is-live" : "") + '"></span><span class="pm-status-label">' + statusLabel + '</span><button class="pm-switch ' + (state.acceptingOrders ? "is-on" : "") + '" type="button" data-action="toggle-orders" aria-label="Toggle accepting orders" aria-pressed="' + state.acceptingOrders + '"></button></div>',
            '<div class="pm-notification-wrap"><button class="pm-icon-button" type="button" data-action="toggle-notifications" aria-label="Notifications" aria-expanded="' + state.showNotifications + '">' + icon("notifications") + '<span class="pm-badge-dot"></span></button>' +
              (state.showNotifications ? '<div class="pm-popover is-notifications"><div class="pm-popover-head"><p class="pm-popover-title">Notifications</p><span class="pm-new-pill">2 new</span></div><div class="pm-note"><strong>#ORD-9021 is delayed</strong><span>Kitchen timer needs attention.</span></div><div class="pm-note"><strong>Samosa is out of stock</strong><span>Inventory toggle is currently off.</span></div></div>' : "") +
            '</div>',
            '<div class="pm-notification-wrap"><button class="pm-icon-button pm-help" type="button" data-action="toggle-help" aria-label="Support" aria-expanded="' + state.showHelp + '">' + icon("help") + '</button>' +
              (state.showHelp ? '<div class="pm-popover is-help"><div class="pm-help-menu"><button class="pm-help-option" type="button" data-action="open-help">Help Center</button><button class="pm-help-option" type="button" data-action="open-shortcuts">Keyboard Shortcuts</button><button class="pm-help-option" type="button" data-action="open-help">Contact Support</button></div></div>' : "") +
            '</div>',
            '<div class="pm-profile-wrap"><button class="pm-icon-button pm-profile-button" type="button" data-action="toggle-signup" aria-label="Open sign up" aria-expanded="' + state.showSignup + '">' + icon("account_circle") + '</button>' +
              (state.showSignup ? '<div class="pm-popover"><p class="pm-popover-title">Sign up</p><p class="pm-signup-copy">Create an ORDR.ai workspace account.</p><form class="pm-signup-form" data-action="signup-submit" novalidate>' +
                '<div><input class="pm-signup-field ' + (restaurantError ? "has-error" : "") + '" name="restaurant" placeholder="Restaurant name" type="text" value="' + escapeHtml(state.signup.restaurant) + '" aria-invalid="' + restaurantError + '">' + (restaurantError ? '<p class="pm-field-error">Enter at least 2 characters.</p>' : "") + '</div>' +
                '<div><input class="pm-signup-field ' + (emailError ? "has-error" : "") + '" name="email" placeholder="Email address" type="email" value="' + escapeHtml(state.signup.email) + '" aria-invalid="' + emailError + '">' + (emailError ? '<p class="pm-field-error">Enter a valid email address.</p>' : "") + '</div>' +
                '<button class="pm-button" type="submit">Continue</button>' + (state.signupComplete ? '<p class="pm-success" role="status">Sign-up details look good.</p>' : "") +
              '</form></div>' : "") +
            '</div>',
          '</div>'
        ].join("");

        root.querySelectorAll('[data-action="global-search"]').forEach(function (input) {
          input.value = state.searchQuery;
        });
      }

      function renderContent() {
        var content = root.querySelector('[data-region="content"]');
        if (state.isLoadingPage) {
          content.innerHTML = '<div class="pm-loading" aria-busy="true"><div class="pm-skeleton"></div><div class="pm-skeleton"></div><div class="pm-skeleton"></div></div>';
          return;
        }
        if (state.activePage === "packing") content.innerHTML = renderPackingPage();
        else if (state.activePage === "transit") content.innerHTML = renderTransitPage();
        else if (state.activePage === "inventory") content.innerHTML = renderInventoryPage();
        else content.innerHTML = renderDashboard();
      }

      function refreshButton(label) {
        return '<button type="button" class="pm-icon-button pm-refresh" data-action="refresh" aria-label="' + escapeHtml(label) + '" ' + (state.isRefreshing ? "disabled" : "") + '><span class="' + (state.isRefreshing ? "pm-rotate" : "") + '">' + icon("refresh") + '</span></button>';
      }

      function packingMatches(order) {
        var q = state.searchQuery.toLowerCase();
        return (order.id + " " + order.elapsed + " " + (order.packBy || "") + " " + order.items.join(" ") + " " + (order.addOns || "")).toLowerCase().indexOf(q) > -1;
      }

      function transitMatches(order) {
        var q = state.searchQuery.toLowerCase();
        var items = order.selectedItems || order.items;
        return (order.id + " " + order.dispatchedAt + " " + items.join(" ")).toLowerCase().indexOf(q) > -1;
      }

      function sortPacking(list) {
        return list.slice().sort(function (a, b) {
          return Number(b.delayed) - Number(a.delayed) || a.id.localeCompare(b.id);
        });
      }

      function renderDashboard() {
        var packing = sortPacking(state.packingOrders.filter(packingMatches));
        var transit = state.transitOrders.filter(transitMatches);
        var delivered = state.deliveredOrders.filter(function (order) {
          return order.id.toLowerCase().indexOf(state.searchQuery.toLowerCase()) > -1;
        });
        return '<div class="pm-page pm-board-page"><div class="pm-board-area pm-scroll-none"><div class="pm-columns">' +
          renderColumn("Kitchen / Packing", packing.length, packing.map(renderPackingCard).join("")) +
          renderColumn("In Transit", transit.length, transit.map(renderTransitCard).join("")) +
          renderColumn("Delivered", delivered.length, delivered.map(renderDeliveredCard).join(""), refreshButton("Refresh Live Orders")) +
          '</div></div>' + renderInventoryControl() + '</div>';
      }

      function renderColumn(title, count, body, action) {
        return '<section class="pm-column"><div class="pm-column-head"><h2 class="pm-column-title">' + escapeHtml(title) + '<span class="pm-count">' + escapeHtml(count) + '</span></h2>' + (action || "") + '</div><div class="pm-card-list">' + (body || '<div class="pm-empty">No matching orders.</div>') + '</div></section>';
      }

      function renderPackingCard(order) {
        return '<div class="pm-card"><div class="pm-card-top"><span class="pm-card-id">' + escapeHtml(order.id) + '</span>' +
          (order.delayed ? '<span class="pm-pill pm-pill-delayed">Delayed</span>' : '<span class="pm-pill pm-pill-muted">Normal</span>') +
          '</div><div class="pm-items">' + order.items.map(function (item) { return '<p>' + escapeHtml(item) + '</p>'; }).join("") +
          (order.addOns ? '<p class="pm-addon">Add-ons: ' + escapeHtml(order.addOns) + '</p>' : "") + '</div>' +
          (order.delayed ? '<div class="pm-progress"><span style="width:' + Number(order.progress) + '%"></span></div>' : "") +
          '<div class="pm-card-foot"><div class="pm-time ' + (order.delayed ? "is-delayed" : "") + '">' + icon("schedule") + '<span>' + (order.delayed ? "Time Up: " + escapeHtml(order.elapsed.replace(" (Time Up)", "")) : escapeHtml(order.elapsed)) + '</span></div>' +
          '<button class="pm-ship-button" type="button" data-action="ship-request" data-id="' + escapeHtml(order.id) + '">Mark Shipped</button></div>' +
          (!order.delayed ? '<div class="pm-packby">' + icon("event_available") + 'Pack by ' + escapeHtml(order.packBy) + '</div>' : "") + '</div>';
      }

      function renderTransitCard(order) {
        var items = order.selectedItems || order.items;
        return '<div class="pm-card"><div class="pm-card-top"><div class="pm-transit-title"><span class="pm-card-id">' + escapeHtml(order.id) + '</span>' + icon("local_shipping") + '</div><span class="pm-dispatched">DISPATCHED ' + escapeHtml(order.dispatchedAt) + '</span></div>' +
          '<div class="pm-items">' + items.map(function (item) { return '<p>' + escapeHtml(item) + '</p>'; }).join("") + '</div>' +
          '<button class="pm-deliver-button" type="button" data-action="mark-delivered" data-id="' + escapeHtml(order.id) + '">Mark Delivered</button></div>';
      }

      function renderDeliveredCard(order) {
        return '<div class="pm-delivered-card"><div><strong>' + escapeHtml(order.id) + '</strong><p>' + order.itemCount + ' Items - Complete</p></div><div><p class="pm-delivered-label">DELIVERED</p><p>' + escapeHtml(order.deliveredAt) + '</p></div></div>';
      }

      function renderInventoryControl() {
        var filtered = state.items.filter(function (item) {
          var matchesFilter = state.controlFilter === "All" || item.category === state.controlFilter;
          var matchesSearch = (item.name + " " + item.category).toLowerCase().indexOf(state.controlSearch.toLowerCase()) > -1;
          return matchesFilter && matchesSearch;
        }).slice(0, 8);
        return '<aside class="pm-side-panel"><h3 class="pm-side-title">Inventory Control</h3><p class="pm-side-copy">Quickly toggle item availability to stop incoming orders for out-of-stock dishes.</p>' +
          '<label class="pm-control-search">' + icon("search") + '<input type="search" data-action="control-search" placeholder="Search items..." value="' + escapeHtml(state.controlSearch) + '"></label>' +
          '<div class="pm-filter-row">' + inventoryFilters.map(function (filter) {
            var label = filter === "Main Course" ? "Lunch" : filter === "Sides & Breads" ? "Dinner" : filter;
            return '<button class="pm-filter-button ' + (state.controlFilter === filter ? "is-active" : "") + '" type="button" data-action="control-filter" data-filter="' + escapeHtml(filter) + '">' + escapeHtml(label) + '</button>';
          }).join("") + '</div><p class="pm-eyebrow">Popular Items</p><div>' + filtered.map(function (item) {
            return '<div class="pm-item-row"><p class="pm-item-title">' + escapeHtml(item.name) + '</p><button class="pm-toggle ' + (item.available ? "is-on" : "") + '" type="button" data-action="toggle-item" data-id="' + item.id + '" aria-label="Toggle ' + escapeHtml(item.name) + '" aria-pressed="' + item.available + '"></button></div>';
          }).join("") + '</div></aside>';
      }

      function renderPackingPage() {
        var jobs = sortPacking(state.packingOrders.filter(packingMatches));
        return '<div class="pm-page pm-standard-page"><div class="pm-inner"><div class="pm-page-head"><div class="pm-title-wrap"><h2 class="pm-heading">Kitchen / Packing</h2><span class="pm-count">' + jobs.length + '</span></div>' + refreshButton("Refresh Kitchen / Packing") + '</div>' +
          (jobs.length ? '<div class="pm-grid">' + jobs.map(renderPackingCard).join("") + '</div>' : '<div class="pm-empty">No kitchen or packing orders match your search.</div>') +
          '</div></div>';
      }

      function renderTransitPage() {
        var parcels = state.transitOrders.filter(transitMatches);
        return '<div class="pm-page pm-standard-page"><div class="pm-inner"><div class="pm-page-head"><div class="pm-title-wrap"><h2 class="pm-heading">In Transit</h2><span class="pm-count">' + parcels.length + '</span></div>' + refreshButton("Refresh In Transit") + '</div>' +
          (parcels.length ? '<div class="pm-grid">' + parcels.map(renderTransitCard).join("") + '</div>' : '<div class="pm-empty">No in-transit parcels match your search.</div>') +
          '</div></div>';
      }

      function renderInventoryPage() {
        var combined = (state.searchQuery + " " + state.inventorySearch).trim().toLowerCase();
        var outOfStock = state.items.filter(function (item) { return !item.available; }).length;
        var filtered = state.items.filter(function (item) {
          var matchesText = (item.name + " " + item.category).toLowerCase().indexOf(combined) > -1;
          var matchesFilter = state.inventoryFilter === "All Items" || (state.inventoryFilter === "Out of Stock" ? !item.available : item.category === state.inventoryFilter);
          return matchesText && matchesFilter;
        });
        return '<div class="pm-page pm-inventory-page"><div class="pm-inventory-main"><div class="pm-inventory-inner"><div class="pm-inventory-header"><div><h1>Inventory Management</h1><p>Manage global availability of your menu items</p></div>' + refreshButton("Refresh Inventory") + '</div>' +
          '<label class="pm-inventory-search">' + icon("search") + '<input type="search" data-action="inventory-search" placeholder="Search item name or category " value="' + escapeHtml(state.inventorySearch) + '"></label>' +
          '<div class="pm-filter-row pm-wide-filters">' + inventoryPageFilters.map(function (filter) {
            var label = filter === "All Items" ? filter + " (" + state.items.length + ")" : filter;
            return '<button class="pm-filter-button ' + (state.inventoryFilter === filter ? "is-active" : "") + '" type="button" data-action="inventory-filter" data-filter="' + escapeHtml(filter) + '">' + escapeHtml(label) + '</button>';
          }).join("") + '</div>' +
          (filtered.length ? '<div class="pm-inventory-grid">' + filtered.map(function (item) {
            return '<div class="pm-inventory-card"><div><h4>' + escapeHtml(item.name) + '</h4><p>' + escapeHtml(item.category) + '</p></div><div class="pm-card-actions"><span class="pm-stock-label ' + (item.available ? "is-available" : "") + '">' + (item.available ? "Available" : "Out of Stock") + '</span><button class="pm-toggle pm-toggle-lg ' + (item.available ? "is-on" : "") + '" type="button" data-action="toggle-item" data-id="' + item.id + '" aria-label="Toggle ' + escapeHtml(item.name) + '" aria-pressed="' + item.available + '"></button></div></div>';
          }).join("") + '</div>' : '<div class="pm-empty">No inventory items match this filter.</div>') +
          '</div></div><aside class="pm-side-panel pm-stats-panel"><h3 class="pm-side-title">Quick Stats</h3><p class="pm-side-copy">System-wide inventory health and stock alerts.</p><div class="pm-stat-card is-warning"><p class="pm-eyebrow">Out of Stock</p><div class="pm-stat-row"><span class="pm-stat-value">' + String(outOfStock).padStart(2, "0") + '</span>' + icon("warning") + '</div></div><div class="pm-stat-card"><p class="pm-eyebrow">Total Items</p><div class="pm-stat-row"><span class="pm-stat-value">' + state.items.length + '</span>' + icon("inventory") + '</div></div></aside></div>';
      }

      function renderModal() {
        var layer = root.querySelector('[data-region="modal"]');
        if (!state.shipmentOrder) {
          layer.classList.remove("is-open");
          layer.innerHTML = "";
          return;
        }
        var selectedCount = Object.keys(state.shipmentSelection).filter(function (key) { return state.shipmentSelection[key]; }).length;
        layer.classList.add("is-open");
        layer.innerHTML = '<div class="pm-dialog" role="dialog" aria-modal="true" aria-labelledby="pm-dialog-title"><div class="pm-dialog-head"><div><h3 id="pm-dialog-title">Confirm shipment</h3><p class="pm-dialog-desc">Order ' + escapeHtml(state.shipmentOrder.id) + '</p></div><button class="pm-icon-button" type="button" data-action="cancel-shipment" aria-label="Close dialog">' + icon("close") + '</button></div>' +
          '<p class="pm-dialog-copy">Review and select the items you want to ship.</p><div class="pm-check-list">' +
          state.shipmentOrder.items.map(function (item, index) {
            return '<label class="pm-check-row"><input type="checkbox" data-action="shipment-check" data-item="' + escapeHtml(item) + '" ' + (state.shipmentSelection[item] ? "checked" : "") + '><span>' + escapeHtml(item) + '</span></label>';
          }).join("") + '</div><div class="pm-dialog-actions"><button class="pm-button pm-button-secondary" type="button" data-action="cancel-shipment">Cancel</button><button class="pm-button" type="button" data-action="confirm-shipment" ' + (selectedCount === 0 || state.isShipmentProcessing ? "disabled" : "") + '>' + (state.isShipmentProcessing ? '<span class="pm-spinner"></span>&nbsp; Shipping...' : "Mark Shipped") + '</button></div></div>';
      }

      function navigate(page) {
        if (!page || page === state.activePage) return;
        state.activePage = page;
        root.classList.remove("is-sidebar-open");
        state.showNotifications = false;
        state.showHelp = false;
        state.showSignup = false;
        state.isLoadingPage = true;
        render();
        window.setTimeout(function () {
          state.isLoadingPage = false;
          render();
        }, 220);
      }

      function refreshPage() {
        if (state.isRefreshing) return;
        state.isRefreshing = true;
        render();
        window.setTimeout(function () {
          state.isRefreshing = false;
          render();
        }, 360);
      }

      function requestShipment(id) {
        var order = state.packingOrders.find(function (item) { return item.id === id; });
        if (!order) return;
        state.shipmentOrder = order;
        state.shipmentSelection = {};
        order.items.forEach(function (item) { state.shipmentSelection[item] = true; });
        render();
      }

      function confirmShipment() {
        if (!state.shipmentOrder || state.isShipmentProcessing) return;
        var selected = state.shipmentOrder.items.filter(function (item) { return state.shipmentSelection[item]; });
        if (!selected.length) return;
        state.isShipmentProcessing = true;
        renderModal();
        window.setTimeout(function () {
          var shipped = state.shipmentOrder;
          state.packingOrders = state.packingOrders.filter(function (order) { return order.id !== shipped.id; });
          state.transitOrders.unshift({
            id: shipped.id,
            dispatchedAt: timeNow(),
            items: selected.slice(),
            selectedItems: selected.slice()
          });
          state.shipmentOrder = null;
          state.shipmentSelection = {};
          state.isShipmentProcessing = false;
          render();
        }, 250);
      }

      function markDelivered(id) {
        var order = state.transitOrders.find(function (item) { return item.id === id; });
        if (!order) return;
        var items = order.selectedItems || order.items;
        state.transitOrders = state.transitOrders.filter(function (item) { return item.id !== id; });
        state.deliveredOrders.unshift({ id: order.id, itemCount: items.length, deliveredAt: timeNow() });
        render();
      }

      function toggleItem(id) {
        state.items = state.items.map(function (item) {
          return item.id === id ? Object.assign({}, item, { available: !item.available }) : item;
        });
        render();
      }

      root.addEventListener("click", function (event) {
        var target = event.target.closest("[data-action]");
        if (!target || !root.contains(target)) return;
        var action = target.getAttribute("data-action");
        if (action === "navigate") navigate(target.getAttribute("data-page"));
        if (action === "open-sidebar") root.classList.add("is-sidebar-open");
        if (action === "close-sidebar") root.classList.remove("is-sidebar-open");
        if (action === "toggle-orders") { state.acceptingOrders = !state.acceptingOrders; render(); }
        if (action === "toggle-notifications") { state.showNotifications = !state.showNotifications; state.showHelp = false; state.showSignup = false; render(); }
        if (action === "toggle-help") { state.showHelp = !state.showHelp; state.showNotifications = false; state.showSignup = false; render(); }
        if (action === "toggle-signup") { state.showSignup = !state.showSignup; state.showNotifications = false; state.showHelp = false; render(); }
        if (action === "open-help") window.open("https://ordrai.in", "_blank", "noopener,noreferrer");
        if (action === "open-shortcuts") { state.showHelp = false; render(); }
        if (action === "refresh") refreshPage();
        if (action === "ship-request") requestShipment(target.getAttribute("data-id"));
        if (action === "mark-delivered") markDelivered(target.getAttribute("data-id"));
        if (action === "toggle-item") toggleItem(target.getAttribute("data-id"));
        if (action === "control-filter") { state.controlFilter = target.getAttribute("data-filter"); render(); }
        if (action === "inventory-filter") { state.inventoryFilter = target.getAttribute("data-filter"); render(); }
        if (action === "cancel-shipment") { state.shipmentOrder = null; state.shipmentSelection = {}; render(); }
        if (action === "confirm-shipment") confirmShipment();
      });

      root.addEventListener("input", function (event) {
        var target = event.target;
        var action = target.getAttribute("data-action");
        if (action === "global-search") {
          state.searchQuery = target.value;
          renderContent();
          root.querySelectorAll('[data-action="global-search"]').forEach(function (input) {
            if (input !== target) input.value = state.searchQuery;
          });
          hydrateIcons();
        }
        if (action === "control-search") { state.controlSearch = target.value; renderContent(); hydrateIcons(); }
        if (action === "inventory-search") { state.inventorySearch = target.value; renderContent(); hydrateIcons(); }
        if (target.name === "restaurant") state.signup.restaurant = target.value;
        if (target.name === "email") state.signup.email = target.value;
        if (action === "shipment-check") {
          state.shipmentSelection[target.getAttribute("data-item")] = target.checked;
          renderModal();
          hydrateIcons();
        }
      });

      root.addEventListener("submit", function (event) {
        var form = event.target.closest('[data-action="signup-submit"]');
        if (!form) return;
        event.preventDefault();
        state.signup.restaurant = form.elements.restaurant.value;
        state.signup.email = form.elements.email.value;
        state.signupSubmitted = true;
        state.signupComplete = state.signup.restaurant.trim().length >= 2 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.signup.email);
        render();
      });

      root.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          state.showNotifications = false;
          state.showHelp = false;
          state.showSignup = false;
          if (state.shipmentOrder) {
            state.shipmentOrder = null;
            state.shipmentSelection = {};
          }
          root.classList.remove("is-sidebar-open");
          render();
        }
      });

      render();
    })();
  </script>
</body>
</html>
