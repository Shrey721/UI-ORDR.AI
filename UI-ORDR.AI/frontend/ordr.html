          if (action === 'financial-chart-view') return setState((s) => { s.financials.chartView = value; });
          if (action === 'financial-table-period') return setState((s) => { s.financials.tablePeriod = value; s.financials.tableFilter = 'All'; });
          if (action === 'financial-table-filter-toggle') return setState((s) => { s.financials.tableFilterOpen = !s.financials.tableFilterOpen; });
          if (action === 'financial-table-filter-set') return setState((s) => { s.financials.tableFilter = value; s.financials.tableFilterOpen = false; if (value === 'Custom Date') s.financials.customDateOpen = true; });

          if (action === 'food-period') return setState((s) => { if (value === 'Custom Range') { s.foodInsights.timePeriod = 'Custom Range'; s.foodInsights.customRangeOpen = true; } else { s.foodInsights.timePeriod = value; s.foodInsights.customRangeOpen = false; } });
          if (action === 'food-filter-toggle') return setState((s) => { s.foodInsights.filterOpen = !s.foodInsights.filterOpen; });
          if (action === 'food-category') return setState((s) => { s.foodInsights.selectedCategory = value; });
          if (action === 'food-clear') return setState((s) => { s.foodInsights.startDate = ''; s.foodInsights.endDate = ''; s.foodInsights.customRangeOpen = false; s.foodInsights.timePeriod = 'Week'; });
          if (action === 'food-apply') return setState((s) => { if (!s.foodInsights.startDate || !s.foodInsights.endDate || s.foodInsights.startDate > s.foodInsights.endDate) return; s.foodInsights.timePeriod = 'Custom Range'; s.foodInsights.customRangeOpen = false; });
          if (action === 'food-export') return exportCsv('food-insights.csv', ['Item', 'Category', 'Orders', 'Revenue', 'Rating', 'Status'], filteredFoodItems().map((item) => [item.name, item.category, item.orders, item.revenue, item.rating, item.status]));

          if (action === 'menu-category') return setState((s) => { s.menuManagement.categoryFilter = control.value; });
          if (action === 'menu-availability') return setState((s) => { s.menuManagement.availabilityFilter = control.value; });
          if (action === 'menu-time') return setState((s) => { s.menuManagement.timeFilter = control.value; });
          if (action === 'menu-select-item') return setState((s) => { s.menuManagement.activeItemId = Number(control.getAttribute('data-id')); });
          if (action === 'menu-toggle-availability') return setState((s) => { const id = Number(control.getAttribute('data-id')); s.menuManagement.menuItems = s.menuManagement.menuItems.map((item) => item.id === id ? { ...item, status: !item.status } : item); });
          if (action === 'menu-name') return setState((s) => { const active = activeMenuItem(); active.name = control.value; });
          if (action === 'menu-price') return setState((s) => { const active = activeMenuItem(); active.price = Number(control.value || 0); });
          if (action === 'menu-category-active') return setState((s) => { const active = activeMenuItem(); active.category = control.value; });
          if (action === 'menu-toggle-slot') return setState((s) => { const active = activeMenuItem(); const slot = value; active.timeBasedAvailability = active.timeBasedAvailability.includes(slot) ? active.timeBasedAvailability.filter((item) => item !== slot) : [...active.timeBasedAvailability, slot]; });
          if (action === 'menu-toggle-seasonal') return setState((s) => { const active = activeMenuItem(); active.seasonalAvailable = !active.seasonalAvailable; });
          if (action === 'menu-season-start') return setState((s) => { const active = activeMenuItem(); active.seasonalDates.start = control.value; });
          if (action === 'menu-season-end') return setState((s) => { const active = activeMenuItem(); active.seasonalDates.end = control.value; });
          if (action === 'menu-add-item') return setState((s) => { const newItem = { id: Date.now(), name: 'New Item', category: 'Main Course', price: 100, status: true, tags: ['Standard'], available: true, timeBasedAvailability: ['Lunch'], seasonalAvailable: false, seasonalDates: { start: '', end: '' } }; s.menuManagement.menuItems = [newItem, ...s.menuManagement.menuItems]; s.menuManagement.activeItemId = newItem.id; });
          if (action === 'menu-save') return setState((s) => { s.menuManagement.menuItems = [...s.menuManagement.menuItems]; });

          if (action === 'outlet-tab') return setState((s) => { s.outletSettings.activeTab = value; });
          if (action === 'outlet-toggle-orders') return setState((s) => { s.outletSettings.formData.acceptingOrders = !s.outletSettings.formData.acceptingOrders; });
          if (action === 'outlet-add-cuisine') return setState((s) => { const normalized = s.outletSettings.newCuisine.trim(); if (!normalized) return; if (s.outletSettings.formData.cuisines.includes(normalized)) return; s.outletSettings.formData.cuisines = [...s.outletSettings.formData.cuisines, normalized]; s.outletSettings.newCuisine = ''; });
          if (action === 'outlet-remove-cuisine') return setState((s) => { s.outletSettings.formData.cuisines = s.outletSettings.formData.cuisines.filter((item) => item !== value); });
          if (action === 'outlet-save') return setState((s) => { s.outletSettings.saved = true; clearTimeout(outletSaveTimer); outletSaveTimer = setTimeout(() => { s.outletSettings.saved = false; render(); }, 2200); });
        });

        document.addEventListener('input', (event) => {
          const control = event.target.closest('[data-action]');
          if (!control) return;
          const action = control.getAttribute('data-action');
          if (action === 'search') { state.searchQuery = control.value; render(); return; }
          if (action === 'financial-start') { state.financials.customRange.start = control.value; render(); return; }
          if (action === 'financial-end') { state.financials.customRange.end = control.value; render(); return; }
          if (action === 'command-period') { state.commandCenter.activePeriod = control.value; setTimeout(() => render(), 0); return; }
          if (action === 'food-start') { state.foodInsights.startDate = control.value; render(); return; }
          if (action === 'food-end') { state.foodInsights.endDate = control.value; render(); return; }
          if (action === 'menu-name') { const active = activeMenuItem(); active.name = control.value; render(); return; }
          if (action === 'menu-price') { const active = activeMenuItem(); active.price = Number(control.value || 0); render(); return; }
          if (action === 'menu-category-active') { const active = activeMenuItem(); active.category = control.value; render(); return; }
          if (action === 'menu-season-start') { const active = activeMenuItem(); active.seasonalDates.start = control.value; render(); return; }
          if (action === 'menu-season-end') { const active = activeMenuItem(); active.seasonalDates.end = control.value; render(); return; }
          if (action === 'outlet-field') {
            const field = control.getAttribute('data-field');
            const form = state.outletSettings.formData;
            if (field === 'prepTime' || field === 'deliveryRadius') form[field] = Number(control.value);
            else if (field === 'gstNumber') form[field] = control.value.toUpperCase();
            else form[field] = control.value;
            render();
            return;
          }
          if (action === 'outlet-new-cuisine') { state.outletSettings.newCuisine = control.value; render(); return; }
        });

        // Some form controls (select) fire "change" rather than "input" in some browsers.
        document.addEventListener('change', (event) => {
          const control = event.target.closest('[data-action]');
          if (!control) return;
          const action = control.getAttribute('data-action');
          if (action === 'command-period') { state.commandCenter.activePeriod = control.value; setTimeout(() => render(), 0); return; }
          if (action === 'menu-category') { state.menuManagement.categoryFilter = control.value; setTimeout(() => render(), 0); return; }
          if (action === 'menu-availability') { state.menuManagement.availabilityFilter = control.value; setTimeout(() => render(), 0); return; }
          if (action === 'menu-time') { state.menuManagement.timeFilter = control.value; setTimeout(() => render(), 0); return; }
        });

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            closeTopbarMenus();
            state.commandCenter.exceptionsFilterOpen = false;
            state.customerInsights.filterOpen = false;
            state.financials.customDateOpen = false;
            state.financials.tableFilterOpen = false;
            state.foodInsights.customRangeOpen = false;
            state.foodInsights.filterOpen = false;
            render();
          }
        });

        document.addEventListener('mousedown', (event) => {
          if (event.target.closest('[data-menu]') || event.target.closest('[data-action]')) return;
          closeTopbarMenus();
          state.commandCenter.exceptionsFilterOpen = false;
          state.customerInsights.filterOpen = false;
          state.financials.customDateOpen = false;
          state.financials.tableFilterOpen = false;
          state.foodInsights.customRangeOpen = false;
          state.foodInsights.filterOpen = false;
          render();
        });

        function syncPageFromHash() {
          const pageId = location.hash.replace(/^#/, '');
          const validPage = data.navigationItems.some((item) => item.id === pageId) ? pageId : 'command-center';
          state.currentPage = validPage;
          closeTopbarMenus();
          render();
        }

        window.addEventListener('hashchange', syncPageFromHash);

        syncPageFromHash();
      })();
    </script>
  </body>
</html>
